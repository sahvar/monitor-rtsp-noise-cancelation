services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: webcam-mediamtx
    restart: unless-stopped
    ports:
      - "554:554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "8000:8000/udp"
      - "8001:8001/udp"
      - "8189:8189/udp"
      - "8890:8890/udp"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

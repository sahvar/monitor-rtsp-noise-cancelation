<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PC Webcam to RTSP</title>
    <style>
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f6f7fb;
      }

      main {
        padding: 24px;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(20, 30, 60, 0.12);
      }

      button {
        min-height: 44px;
        margin: 8px 0;
        padding: 0 16px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: #1363df;
        font-size: 16px;
        font-weight: 700;
      }

      button:disabled {
        background: #9aa4b2;
      }

      label {
        display: block;
        margin: 18px 0 6px;
        font-weight: 700;
      }

      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #c7d0dd;
        border-radius: 8px;
        background: #fff;
        color: #172033;
        font-size: 16px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin: 10px 0 16px;
      }

      .actions button {
        flex: 1;
      }

      #refresh {
        background: #3f4b5f;
      }

      .status {
        margin: 16px 0;
        padding: 14px;
        border-radius: 8px;
        background: #eef4ff;
        white-space: pre-wrap;
      }

      .muted {
        color: #526070;
      }

      code {
        display: inline-block;
        max-width: 100%;
        word-break: break-all;
      }

      @media (max-width: 560px) {
        .actions {
          display: block;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>PC Webcam to RTSP</h1>
      <p class="muted">Choose which webcam connected to this PC should publish to the RTSP stream.</p>
      <label for="video-device">Webcam</label>
      <select id="video-device"></select>
      <div class="actions">
        <button id="switch-device">Use Selected Webcam</button>
        <button id="toggle-denoise" type="button">Denoise</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
      <div id="status" class="status">Idle</div>
      <p>RTSP URL: <code id="rtsp-url">checking...</code></p>
      <p>Detected webcams:</p>
      <pre id="device-list" class="status">checking...</pre>
      <p>Server status: <code id="server-status">checking...</code></p>
    </main>
    <script src="/app.js"></script>
  </body>
</html>

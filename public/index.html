<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>iPhone Mic to RTSP</title>
    <style>
      body {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #172033;
        background: #f6f7fb;
      }

      main {
        padding: 24px;
        border-radius: 20px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(20, 30, 60, 0.12);
      }

      button {
        width: 100%;
        margin: 8px 0;
        padding: 16px;
        border: 0;
        border-radius: 14px;
        color: #fff;
        background: #1363df;
        font-size: 18px;
        font-weight: 700;
      }

      button:disabled {
        background: #9aa4b2;
      }

      label {
        display: block;
        margin: 18px 0 6px;
        font-weight: 700;
      }

      select {
        width: 100%;
        padding: 12px;
        border: 1px solid #c7d0dd;
        border-radius: 12px;
        background: #fff;
        color: #172033;
        font-size: 16px;
      }

      #stop {
        background: #b42318;
      }

      .status {
        margin: 16px 0;
        padding: 14px;
        border-radius: 12px;
        background: #eef4ff;
        white-space: pre-wrap;
      }

      .meter {
        height: 14px;
        margin: 12px 0;
        overflow: hidden;
        border-radius: 999px;
        background: #e4e9f1;
      }

      #level-bar {
        width: 0%;
        height: 100%;
        background: #16a34a;
        transition: width 120ms linear;
      }

      code {
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>iPhone Mic to RTSP</h1>
      <p>Open this page on an iPhone, this PC, or any browser with a microphone.</p>
      <label for="audio-device">Microphone</label>
      <select id="audio-device">
        <option value="">Default microphone</option>
      </select>
      <button id="start">Start Microphone Stream</button>
      <button id="stop" disabled>Stop</button>
      <div id="status" class="status">Idle</div>
      <div class="meter" aria-label="Microphone level">
        <div id="level-bar"></div>
      </div>
      <p>Mic level: <code id="mic-level">no signal</code></p>
      <p>Server status: <code id="server-status">checking...</code></p>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
